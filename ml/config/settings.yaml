# ml/config/settings.yaml

paths:
  preflop_jsonl: "data/preflop/preflop.hu.v1.jsonl.gz"
  parsed_hands_jsonl: "data/parsed/hands_NL10.jsonl.gz"   # <- your parsed output
  popnet_jsonl: "data/population/population.v1.jsonl.gz"    # <- exporter target
  # add more as needed

# ===== Settings (change depending on vendor data / chosen environment) =====
settings:
  stacks: [12, 15, 18]   # from your purchased Monker packs (update as more are added)
  rake_tiers: ["MICRO/HIGH", "MID+HIGH STAKES"]
  ante_values: [0.0]     # cash games (expand later for MTTs)
  open_size_policies: ["SMALL_2_2", "STD_2_5"]
  exploit_settings: ["GTO", "EXPLOIT_LIGHT", "EXPLOIT_HEAVY"]
  population_types: ["REGULAR"]   # can extend with "RECREATIONAL"

# ===== Types (fixed enums, not vendor-dependent) =====
types:
  positions: ["UTG", "HJ", "CO", "BTN", "SB", "BB"]
  action_contexts: ["OPEN", "VS_OPEN", "VS_3BET", "VS_4BET", "VS_LIMP", "VS_ISO"]
  multiway_contexts: ["HU", "3WAY", "4WAY_PLUS"]
  villain_profiles: ["GTO", "TAG", "LAG", "NIT", "MANIAC", "FISH"]

board_clustering:
  flop:
    k: 256
    method: lite_v1
    seed: 42
    out_path: data/boards/flop_clusters.k256.lite_v1.json
  turn:
    k: 256          # placeholder; can sweep later (e.g., 256–512)
    method: lite_v1
    seed: 42
    out_path: data/boards/turn_clusters.k256.lite_v1.json
  river:
    k: 128          # placeholder; river needs the least abstraction
    method: lite_v1
    seed: 42
    out_path: data/boards/river_clusters.k128.lite_v1.json

training:
  equitynet:
    # base defaults
    data_path: data/equity/equity_dataset.v1.jsonl.gz
    model_dir: models
    model_path: equitynet_best.pt
    curve_path: equitynet_training.json
    batch_size: 512
    epochs: 15
    lr: 1.0e-3
    val_split: 0.1
    num_workers: 0
    emb_dim: 32
    hidden: 128
    early_stop_patience: 4
    loss: L1

    profiles:
      # ---------- development: quick fit / sanity check ----------
      dev:
        batch_size: 256
        epochs: 8
        lr: 1.0e-3
        val_split: 0.20
        num_workers: 0
        emb_dim: 32
        hidden: 128
        loss: "L1"                 # "L1" or "MSE"
        early_stop_patience: 2

      # ---------- production: stronger model ----------
      prod:
        batch_size: 1024
        epochs: 30
        lr: 3.0e-4
        val_split: 0.10
        num_workers: 4
        emb_dim: 64
        hidden: 256
        loss: "L1"
        early_stop_patience: 6

  populationnet:
    # which profile to use when ML_PROFILE is not set
    default_profile: dev

    profiles:
      dev:
        # IO
        data_path: "data/population/popnet.v1.jsonl.gz"   # small/dev export
        model_dir: "models"
        model_path: "populationnet_dev.pt"
        curve_path: "populationnet_dev_training.json"

        # HParams
        batch_size: 1024
        epochs: 8
        lr: 1e-3
        val_split: 0.10
        hidden: 256
        dropout: 0.15
        num_workers: 0
        loss: "L1"            # or "MSE"

      prod:
        # IO
        data_path: "data/population/popnet.v1.jsonl.gz"       # full export
        model_dir: "models"
        model_path: "populationnet_prod.pt"
        curve_path: "populationnet_prod_training.json"

        # HParams
        batch_size: 2048
        epochs: 20
        lr: 1e-3
        val_split: 0.05
        hidden: 384
        dropout: 0.10
        num_workers: 4
        loss: "L1"

  exploitnet:
    default_profile: dev
    profiles:
      dev:
        data_path: "data/exploit/exploitnet.v1.jsonl.gz"
        model_dir: "models"
        model_path: "exploitnet_dev.pt"
        curve_path: "exploitnet_dev_training.json"
        batch_size: 512
        epochs: 4
        lr: 1e-3
        val_split: 0.1
        hidden: 192
        dropout: 0.10
        num_workers: 0
        lambda_size: 0.5
        early_stop_patience: 4
      prod:
        data_path: "s3://.../exploitnet.latest.jsonl.gz"
        model_dir: "models"
        model_path: "exploitnet_prod.pt"
        curve_path: "exploitnet_prod_training.json"
        batch_size: 1024              # safer default
        epochs: 35                    # give early stop room
        lr: 8e-4
        val_split: 0.1                # keep enough for validation
        hidden: 384
        dropout: 0.15
        num_workers: 2
        lambda_size: 0.7
        early_stop_patience: 6        # allow a bit more patience


exploit_generation:
  default_profile: dev

  profiles:
    dev:
      actions: ["fold","check","call","bet","raise","allin","_noop"]   # optional but explicit
      profiles: ["GTO","TAG","LAG","NIT","MANIAC","FISH"]              # optional; for UI/logging
      profile_priors: {"GTO":0.45,"TAG":0.25,"LAG":0.12,"NIT":0.08,"MANIAC":0.05,"FISH":0.05}
      size_buckets:
        edges: [0.33, 0.5, 0.75, 1.0, 1.5, 99.0]   # 99.0=“jam”; will clamp to eff stack
      profile_params:
        GTO:    {preflop_aggr:0.60, postflop_cbet:0.60, bluff_rate:0.20, fold_to_3bet:0.45}
        TAG:    {preflop_aggr:0.55, postflop_cbet:0.62, bluff_rate:0.18, fold_to_3bet:0.55}
        LAG:    {preflop_aggr:0.70, postflop_cbet:0.68, bluff_rate:0.28, fold_to_3bet:0.38, size_bias: +1}
        NIT:    {preflop_aggr:0.40, postflop_cbet:0.50, bluff_rate:0.10, fold_to_3bet:0.65, size_bias: -1}
        MANIAC: {preflop_aggr:0.85, postflop_cbet:0.72, bluff_rate:0.45, fold_to_3bet:0.25, size_bias: +1}
        FISH:   {preflop_aggr:0.45, postflop_cbet:0.42, bluff_rate:0.15, fold_to_3bet:0.70}

    prod:
      actions: ["fold","check","call","bet","raise","allin","_noop"]
      profile_priors: {"GTO":0.35,"TAG":0.30,"LAG":0.15,"NIT":0.10,"MANIAC":0.05,"FISH":0.05}
      size_buckets:
        edges: [0.33, 0.5, 0.75, 1.0, 1.5, 2.0]     # tighter than dev
      profile_params:
        GTO:    {preflop_aggr:0.60, postflop_cbet:0.60, bluff_rate:0.20, fold_to_3bet:0.45}
        TAG:    {preflop_aggr:0.55, postflop_cbet:0.62, bluff_rate:0.18, fold_to_3bet:0.55}
        LAG:    {preflop_aggr:0.70, postflop_cbet:0.68, bluff_rate:0.28, fold_to_3bet:0.38, size_bias: +1}
        NIT:    {preflop_aggr:0.40, postflop_cbet:0.50, bluff_rate:0.10, fold_to_3bet:0.65, size_bias: -1}
        MANIAC:{preflop_aggr:0.85, postflop_cbet:0.72, bluff_rate:0.45, fold_to_3bet:0.25, size_bias: +1}
        FISH:  {preflop_aggr:0.45, postflop_cbet:0.42, bluff_rate:0.15, fold_to_3bet:0.70}

rangenet:
    default_profile: dev
    profiles:
      dev:
        # --- data (produced by build_rangenet_dataset.py) ---
        ds_dir: "data/datasets/rangenet.v1"
        train_glob: "train/*.parquet"
        val_glob:   "val/*.parquet"
        test_glob:  "test/*.parquet"

        # --- model output ---
        model_dir:  "models"
        model_path: "rangenet_dev.pt"
        curve_path: "rangenet_dev_training.json"

        # --- training hyperparams (dev-friendly) ---
        batch_size: 1024
        epochs: 6
        lr: 1e-3
        hidden: 256
        dropout: 0.10
        num_workers: 0
        early_stop_patience: 3

        # --- heads / vocab ---
        hand_vocab: "169"          # 169-grid (AKs/AKo/AA…)
        action_head: ["fold","call","raise"]  # matches exporter’s action_probs shape

        # Optional: if/when you add discretized raise sizes for opens/3bets
        raise_size_bins_bb: [2.0, 2.5, 3.0, 3.5]   # not used unless your dataset provides bucket labels

      prod:
        ds_dir: "s3://…/rangenet.latest"          # or your synced folder
        train_glob: "train/*.parquet"
        val_glob:   "val/*.parquet"
        test_glob:  "test/*.parquet"

        model_dir:  "models"
        model_path: "rangenet_prod.pt"
        curve_path: "rangenet_prod_training.json"

        batch_size: 2048
        epochs: 20
        lr: 8e-4
        hidden: 384
        dropout: 0.15
        num_workers: 2
        early_stop_patience: 5

        hand_vocab: "169"
        action_head: ["fold","call","raise"]
        raise_size_bins_bb: [2.0, 2.5, 3.0, 3.5]


equity_generation:
  # base defaults (used if no profile override)
  seed: 42
  samples_per_hand: 2000
  keep_fraction: 1.0          # 0–1 thinning of spots
  stacks_whitelist: []         # optional int list, e.g. [12,15,18]
  hands_subset: []             # optional subset, e.g. ["AA","AKs","AQo"]
  log_every_rows: 5000

  profiles:
    # ---------- development: quick & cheap ----------
    dev:
      seed: 42
      samples_per_hand: 32        # aggregated trials per hero hand
      keep_fraction: 0.02         # keep 2% of preflop spots (random thinning)
      stacks_whitelist: [ 12, 15, 18 ]     # limit to your current Monker subset
      hands_subset: # small hand slice for fast loop
        - AA - KK - QQ - JJ
        - AKs - AQs - AJs - ATs
        - AKo - AQo
        - 99 - 88
        - A5s - KQs - QJs - JTs
      log_every_rows: 2000

    # ---------- production: full dataset ----------
    prod:
      seed: 1337
      samples_per_hand: 2000      # (use 1024–4096 if you want; 2000 matches earlier plan)
      keep_fraction: 1.0          # keep all preflop spots
      stacks_whitelist: [ ]        # empty → allow all stacks
      hands_subset: [ ]            # empty → all 169 hands
      log_every_rows: 100000

population_generation:
  profile: dev
  profiles:
    dev:
      keep_fraction: 0.05   # thin for quick loops
      seed: 42
    prod:
      keep_fraction: 1.0
      seed: 42

seed: 42


