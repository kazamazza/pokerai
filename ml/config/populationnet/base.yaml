# ========= PopulationNet — V1 FINAL (NL10) =========

dataset:
  x_cols:
    - stakes_id
    - street_id
    - ctx_id
    - hero_pos_id
    - villain_pos_id     # ✅ ADD (was used in coverage grouping)
    - facing_id
    - spr_bin
    - bet_size_bucket

  # Soft-label target columns (must sum to 1 per row)
  y_cols: ["p_fold", "p_call", "p_raise"]

  weight_col: "w"

  filters:
    keep_ctx_ids: ~
    keep_street_ids: ~
    min_weight: 10        # ✅ was 20; 10 keeps more coverage

  # Train/val split
  stratify_keys:
    - ctx_id
    - street_id
    - facing_id          # ✅ ADD
    - spr_bin            # ✅ ADD
  train_frac: 0.80

coverage:
  enabled: true
  output: reports/coverage/populationnet_nl10.json
  group_by: ["stakes_id","street_id","ctx_id","hero_pos_id","villain_pos_id"]
  min_rows_per_cell: 50
  min_cells_per_ctx: 10
  alpha: 1.0
  input_decisions: ~

model:
  hidden_dims: [64, 64]
  dropout: 0.10
  lr: 0.001
  weight_decay: 0.0001
  warmup_steps: 0
  max_steps: 0
  min_lr_scale: 0.05

train:
  seed: 42
  batch_size: 2048
  max_epochs: 10
  patience: 3
  checkpoints_dir: checkpoints/popnet
  monitor: val_loss
  mode: min
  accelerator: auto
  devices: auto
  precision: 16-mixed
  resume_from: ~

eval:
  use_best_ckpt: true
  output_dir: reports/eval/populationnet
  filters: {}

logging:
  logger: "tensorboard"
  tb_log_dir: logs/tb/popnet
  csv_log_dir: logs/csv/popnet

build:
  out_parquet: data/datasets/populationnet_nl10.parquet
  weight_mode: count
  min_rows: 20

sweep:
  model.lr: [0.001, 0.0005]
  model.hidden_dims: [[64,64], [128,64]]
  model.dropout: [0.05, 0.10]
  train.batch_size: [1024, 2048]
  train.max_epochs: [8, 12]
  dataset.filters.min_weight: [5, 10]   # ✅ correct path for sweep
  max_trials: 12