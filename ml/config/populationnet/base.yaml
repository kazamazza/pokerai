# =========================
# PopulationNet (PROD BASE)
# =========================

# -------- Inputs --------
inputs:
  parquet: data/artifacts/decisions_enriched_nl10.parquet   # <- enriched decisions

# -------- Dataset --------
dataset:
  x_cols:
    - stakes_id
    - street_id
    - ctx_id
    - hero_pos_id
    - facing_id
    - spr_bin
    - bet_size_bucket

  # Soft-label target columns (must sum to 1 per row post-normalization)
  y_cols: ["p_fold", "p_call", "p_raise"]

  # Sample weight column
  weight_col: "w"

  # Optional load-time filters (most filtering should already be done in the builder)
  filters:
    keep_ctx_ids: ~            # e.g. [0,1,2] or null
    keep_street_ids: ~         # e.g. [1] for FLOP only or null
    min_weight: 20

  # Train/val split
  stratify_keys: ["ctx_id", "street_id"]  # preserves distribution across contexts/streets
  train_frac: 0.80


board_clustering:
  type: kmeans
  artifact: data/artifacts/board_clusters_kmeans_128.json
  n_clusters: 128

# -------- Coverage (optional but recommended pre-train audit) --------
coverage:
  enabled: true
  output: reports/coverage/populationnet_nl10.json
  group_by: ["stakes_id","street_id","ctx_id","hero_pos_id","villain_pos_id"]
  min_rows_per_cell: 50         # flag sparse cells
  min_cells_per_ctx: 10         # flag underrepresented contexts
  alpha: 1.0                    # smoothing for rates if you compute them here
  input_decisions: ~            # optional: s3://bucket/path/decisions.jsonl.gz (for deeper audits)

# -------- Model --------
model:
  hidden_dims: [64, 64]
  dropout: 0.10
  lr: 0.001
  weight_decay: 0.0001
  # optional scheduler knobs (model implements them)
  warmup_steps: 0
  max_steps: 0
  min_lr_scale: 0.05

# -------- Training --------
train:
  seed: 42
  batch_size: 2048
  max_epochs: 10
  patience: 3
  checkpoints_dir: checkpoints/popnet
  monitor: val_loss
  mode: min
  accelerator: auto
  devices: auto
  precision: 16-mixed

  # Optional resume
  resume_from: ~                # path/to/ckpt if resuming

# -------- Evaluation --------
eval:
  use_best_ckpt: true
  output_dir: reports/eval/populationnet
  filters: {}                   # same schema as dataset.filters if you want eval subsets

# -------- Logging --------
logging:
  logger: "tensorboard"         # "csv" | "none"
  tb_log_dir: logs/tb/popnet
  csv_log_dir: logs/csv/popnet


build:
  out_parquet: data/datasets/populationnet_nl10.parquet
  weight_mode: count         # count | sqrt | log1p
  min_rows: 20               # drop ultra-sparse cells

sweep:
  model.lr: [0.001, 0.0005]
  model.hidden_dims: [[64,64], [128,64]]
  model.dropout: [0.05, 0.10]
  train.batch_size: [1024, 2048]
  train.max_epochs: [8, 12]
  dataset.min_weight: [5, 10]
  max_trials: 12   # optional cap