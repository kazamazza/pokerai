inputs:
  manifest: data/artifacts/monker_manifest.parquet
  parquet_in: data/processed/equitynet_preflop.parquet   # optional pre-agg input

outputs:
  parquet_out: data/datasets/equitynet_preflop.parquet   # built by compute_preflop_equity

equity_mc:
  preflop_samples: 1500
  seed: 42

dataset:
  x_cols: ["stack_bb","hero_pos","opener_action","hand_id"]
  y_cols: ["y_win","y_tie","y_lose"]
  weight_col: "weight"
  scenario_keys: ["stack_bb","hero_pos","opener_action"]
  keep_values: null
  min_weight: null

model:
  hidden_dims: [128, 128]
  dropout: 0.10
  lr: 0.001
  weight_decay: 0.0001

train:
  batch_size: 2048
  max_epochs: 10
  patience: 3
  num_workers: 0
  accelerator: auto
  devices: auto
  precision: "16-mixed"
  seed: 42
  monitor: val_loss
  mode: min
  train_frac: 0.8
  checkpoints_dir: checkpoints/equity_pre