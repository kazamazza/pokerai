name: equitynet_postflop

inputs:
  manifest: data/artifacts/monker_manifest.parquet

outputs:
  postflop_parquet: data/datasets/equitynet_postflop.parquet

board_clustering:
  type: rule
  n_clusters_limit: 6        # was 24
  boards_per_cluster: 2      # was 8
equity_mc:
  postflop_samples: 30       # was 50
  seed: 42
  max_resample: 20

dataset:
  parquet: data/datasets/equitynet_postflop.parquet
  x_cols: ["stack_bb","hero_pos","opener_action","board_cluster_id","hand_id"]
  y_cols: ["p_win","p_tie","p_lose"]
  weight_col: "weight"
  min_weight: 1
  stratify_by: ["stack_bb","hero_pos","opener_action","board_cluster_id"]

model:
  hidden_dims: [128, 128]
  dropout: 0.10
  lr: 0.001
  weight_decay: 0.0001

train:
  batch_size: 2048
  max_epochs: 10
  patience: 3
  num_workers: 0
  pin_memory: true
  accelerator: auto
  devices: auto
  precision: "16-mixed"
  seed: 42
  monitor: val_loss
  mode: min
  train_frac: 0.8
  checkpoints_dir: checkpoints/equity_post