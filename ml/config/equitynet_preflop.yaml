name: equitynet_preflop

inputs:
  manifest: data/artifacts/monker_manifest.parquet
  # optional: precomputed parquet with (stack_bb, hero_pos, opener_action, hand_id, p_freq, weight)
  parquet_in: data/processed/equitynet_preflop.parquet

outputs:
  # built by compute_preflop_equity
  parquet_out: data/datasets/equitynet_preflop.parquet
  # (optional) evaluated parquet (if you separate “build” and “evaluate”)
  evaluated_out: data/artifacts/equitynet_preflop_evaluated.parquet

equity_mc:
  preflop_samples: 10
  seed: 42

dataset:
  x_cols: ["stack_bb","hero_pos","opener_action","hand_id"]
  y_cols: ["y_win","y_tie","y_lose"]
  weight_col: "weight"
  scenario_keys: ["stack_bb","hero_pos","opener_action"]
  keep_values: null
  min_weight: null

model:
  hidden_dims: [128, 128]
  dropout: 0.10
  lr: 0.001
  weight_decay: 0.0001

train:
  batch_size: 2048
  max_epochs: 10
  patience: 3
  num_workers: 0
  accelerator: auto
  devices: auto
  precision: 16-mixed
  seed: 42
  monitor: val_loss
  mode: min
  train_frac: 0.8
  checkpoints_dir: checkpoints/equity_pre