# DEV overrides: faster training and separate outputs
outputs:
  parquet: data/datasets/rangenet_preflop_dev.parquet

build:
  min_files_per_cell: 1
  alpha: 0.0

train:
  batch_size: 1024
  max_epochs: 5
  patience: 2
  checkpoints_dir: checkpoints/range_pre/dev

logging:
  tb_log_dir: logs/tb/range_pre_dev
  csv_log_dir: logs/csv/range_pre_dev