# PROD overrides: stricter filtering, bigger runs, separate outputs
outputs:
  parquet: data/datasets/rangenet_preflop_prod.parquet

build:
  min_files_per_cell: 3
  alpha: 0.2

train:
  batch_size: 4096
  max_epochs: 25
  patience: 6
  checkpoints_dir: checkpoints/range_pre/prod

logging:
  tb_log_dir: logs/tb/range_pre_prod
  csv_log_dir: logs/csv/range_pre_prod

