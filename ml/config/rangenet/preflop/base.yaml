

# === What we build from ===
inputs:
  # Monker manifest (from your scanner), includes:
  # stack_bb, hero_pos, opener_pos, opener_action, rel/abs_path, etc.
  manifest: data/artifacts/monker_manifest.parquet

# === What we produce ===
outputs:
  parquet: data/datasets/rangenet_preflop.parquet

# === Build-time knobs (aggregation) ===
build:
  # minimum files contributing to a cell before we keep it
  min_files_per_cell: 1
  # optional Laplace smoothing on soft labels (applied after averaging)
  alpha: 0.0

# === Dataset schema for training ===
dataset:
  x_cols: [
    "stack_bb",
    "hero_pos",
    "opener_pos",
    "opener_action",
    "ctx"
  ]
  # predict villain range over 169 preflop classes
  y_cols: [
    "y_0","y_1","y_2","y_3","y_4","y_5","y_6","y_7","y_8","y_9",
    "y_10","y_11","y_12","y_13","y_14","y_15","y_16","y_17","y_18","y_19",
    "y_20","y_21","y_22","y_23","y_24","y_25","y_26","y_27","y_28","y_29",
    "y_30","y_31","y_32","y_33","y_34","y_35","y_36","y_37","y_38","y_39",
    "y_40","y_41","y_42","y_43","y_44","y_45","y_46","y_47","y_48","y_49",
    "y_50","y_51","y_52","y_53","y_54","y_55","y_56","y_57","y_58","y_59",
    "y_60","y_61","y_62","y_63","y_64","y_65","y_66","y_67","y_68","y_69",
    "y_70","y_71","y_72","y_73","y_74","y_75","y_76","y_77","y_78","y_79",
    "y_80","y_81","y_82","y_83","y_84","y_85","y_86","y_87","y_88","y_89",
    "y_90","y_91","y_92","y_93","y_94","y_95","y_96","y_97","y_98","y_99",
    "y_100","y_101","y_102","y_103","y_104","y_105","y_106","y_107","y_108","y_109",
    "y_110","y_111","y_112","y_113","y_114","y_115","y_116","y_117","y_118","y_119",
    "y_120","y_121","y_122","y_123","y_124","y_125","y_126","y_127","y_128","y_129",
    "y_130","y_131","y_132","y_133","y_134","y_135","y_136","y_137","y_138","y_139",
    "y_140","y_141","y_142","y_143","y_144","y_145","y_146","y_147","y_148","y_149",
    "y_150","y_151","y_152","y_153","y_154","y_155","y_156","y_157","y_158","y_159",
    "y_160","y_161","y_162","y_163","y_164","y_165","y_166","y_167","y_168"
  ]
  weight_col: "weight"
  min_weight: 1
  stratify_by: ["stack_bb","hero_pos","opener_pos","opener_action"]

# === Model ===
model:
  hidden_dims: [128, 128]
  dropout: 0.10
  lr: 0.001
  weight_decay: 0.0001

# === Training ===
train:
  batch_size: 2048
  max_epochs: 10
  patience: 3
  num_workers: 0
  pin_memory: true
  accelerator: auto
  devices: auto
  precision: "16-mixed"
  seed: 42
  monitor: val_loss
  mode: min
  train_frac: 0.8
  checkpoints_dir: checkpoints/range_pre

# === Eval/Logging (optional) ===
eval:
  use_best_ckpt: true
  output_dir: reports/eval/rangenet_preflop
logging:
  logger: tensorboard
  tb_log_dir: logs/tb/range_pre
  csv_log_dir: logs/csv/range_pre