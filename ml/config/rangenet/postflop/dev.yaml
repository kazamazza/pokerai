board_clustering:
  type: rule
  n_clusters: 48
manifest_build:
  stacks_bb: [ 50, 100 ]
  pots_bb: [ 20 ]                # ✅ add this
  streets: [ 1 ]                 # 1=flop
  position_pairs: [ [ "IP","OOP" ], [ "OOP","IP" ] ]
  bet_menus: [ "std" ]
  board_clusters_limit: 24
  boards_per_cluster: 2
  sample_pool: 20000
solver:
  accuracy: 0.75
  max_iterations: 100
  threads: 4
train:
  batch_size: 512
  max_epochs: 3