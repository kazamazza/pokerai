board_clustering:
  type: kmeans
  artifact: data/artifacts/board_clusters_kmeans_128.json   # your KMeans JSON artifact
  n_clusters: 128

manifest_build:
  stacks_bb: [ 25, 60, 100, 150 ]      # 4 solid anchors
  pots_bb:   [ 18, 28, 40 ]            # 3 SRP buckets (small/med/large)
  position_pairs:
    - [ "UTG", "BB" ]
    - [ "HJ",  "BB" ]
    - [ "CO",  "BB" ]
    - [ "BTN", "BB" ]
    - [ "SB",  "BB" ]
    - [ "BTN", "SB" ]
  bet_menus: [ "std" ]
  board_clusters_limit: 128
  boards_per_cluster: 2
  sample_pool: 50000
  seed: 42

solver:
  accuracy: 0.25
  max_iterations: 800
  threads: 1
  allin_threshold: 0.67
  s3_prefix: solver/outputs/v1
  local_cache_dir: data/solver_cache

train:
  batch_size: 2048
  max_epochs: 10
  patience: 4