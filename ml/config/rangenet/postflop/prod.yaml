board_clustering:
  type: kmeans
  artifact: data/artifacts/board_clusters_kmeans_246.json   # your KMeans JSON artifact
  n_clusters: 246

manifest_build:
  stacks_bb: [ 15, 25, 40, 60, 80, 100, 150, 200 ]   # expand as you purchase
  pots_bb:   [ 18, 24, 32, 45 ]                         # 3–4 buckets across SRP/3BP
  position_pairs:
    - [ "BTN", "BB" ]
    - [ "CO",  "BB" ]
    - [ "SB",  "BB" ]
    - [ "BTN", "SB" ]   # BvB IP
    - [ "SB",  "BB" ]   # BvB OOP (already included above)
  bet_menus: [ "std" ]                                  # single, stable tree
  board_clusters_limit: 246
  boards_per_cluster: 3
  sample_pool: 50000
  seed: 42

solver:
  accuracy: 0.25
  max_iterations: 800
  threads: 1
  allin_threshold: 0.67
  s3_prefix: solver/outputs/v1
  local_cache_dir: data/solver_cache

train:
  batch_size: 2048
  max_epochs: 10
  patience: 4