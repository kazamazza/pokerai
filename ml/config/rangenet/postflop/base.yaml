inputs:
  # used by the *builder*; trainer reads the parts produced by the builder
  monker_manifest: data/artifacts/monker_manifest.parquet
  sph_manifest:    data/artifacts/sph_manifest.parquet
  vendor_s3_prefix: data/vendor
  manifest: data/artifacts/rangenet_postflop_flop_manifest.parquet
  # for the TRAINER: point to the policy parts (directory or explicit part parquet)
  root_parquet: data/datasets/postflop_policy_root.parquet
  facing_parquet: data/datasets/postflop_policy_facing.parquet

builder:
  parts_s3_prefix_root: ""
  parts_s3_prefix_facing: ""

dataset:
  parquet: data/datasets/postflop_policy.parquet

  cat_features:
    - hero_pos
    - ip_pos
    - oop_pos
    - ctx
    - street
    - board_cluster_id      # ✅ added
    - stakes_id

  cont_features:
    - pot_bb
    - stack_bb
    - size_frac
    - board_mask_52

  # use soft labels (one column per action)
  soft_y_cols:
    - FOLD
    - CHECK
    - CALL
    - BET_25
    - BET_33
    - BET_50
    - BET_66
    - BET_75
    - BET_100
    - DONK_33
    - RAISE_150
    - RAISE_200
    - RAISE_300
    - RAISE_400
    - RAISE_500
    - ALLIN

  weight_col: weight
  strict_canon: false

  stratify_keys:
    - ctx
    - ip_pos
    - oop_pos
    - board_cluster_id

  train_frac: 0.80

outputs:
  # for the builder stage if you still emit a merged parquet; otherwise you can drop these
  s3_key:  datasets/rangenet_postflop.parquet


multiway:
  enable: false            # ← stays false for NL10/NL25/NL50
  max_players: 3           # future-proof; clamp to 3-way if you enable it later
  default_menu_id: "limped_multi.Any"   # fallback bet menu for multiway
  default_flop_pot_bb: 3.0 # safe default if you don’t compute exact preflop path
  allow_in_scenarios: true # scenario-level override allowed

board_clustering:
  type: kmeans
  artifact: data/artifacts/board_clusters_kmeans_128.json
  n_clusters: 128

manifest_build:
  include_missing: false
  allow_pair_subs: true
  lookup_max_stack_delta: 200

  board_clusters_limit: 64
  boards_per_cluster: 2
  sample_pool: 50000
  seed: 42

  dedup_keys:
    - street
    - ctx
    - topology
    - ip_actor_flop
    - oop_actor_flop
    - effective_stack_bb
    - pot_bb
    - bet_sizing_id
    - board
    - board_cluster_id
    - range_ip
    - range_oop
    - stake        # ← include stake to avoid cross-stake collisions

  # tools/rangenet/config/scenarios.yml
  # IP must be first in each pair; OOP second. This avoids role ambiguity across services.

  scenarios:
    # --- Single-raised pots (open → defend) ---
    - name: SRP_IP
      ctx: VS_OPEN
      position_pairs:
        # Opener IP vs Blinds OOP
        - [ "UTG", "BB" ]
        - [ "UTG", "SB" ]
        - [ "HJ",  "BB" ]
        - [ "HJ",  "SB" ]
        - [ "CO",  "BB" ]
        - [ "CO",  "SB" ]
        - [ "BTN", "BB" ]
        - [ "BTN", "SB" ]
      bet_menus: [ "srp_ip" ]     # Why: maps to IP postflop menus in SPH/rangenet

    - name: SRP_OOP
      ctx: VS_OPEN
      position_pairs:
        # Same topology, different menu for OOP trees (caller OOP postflop)
        - [ "UTG", "BB" ]
        - [ "UTG", "SB" ]
        - [ "HJ",  "BB" ]
        - [ "HJ",  "SB" ]
        - [ "CO",  "BB" ]
        - [ "CO",  "SB" ]
        - [ "BTN", "BB" ]
        - [ "BTN", "SB" ]
      bet_menus: [ "srp_oop" ]    # Why: OOP-specific tree (sizes/branches)

    # --- Blind vs Steal (CO/BTN open; SB/BB defend) ---
    - name: BLIND_VS_STEAL
      ctx: BLIND_VS_STEAL
      position_pairs:
        - [ "BTN", "BB" ]
        - [ "BTN", "SB" ]
        - [ "CO",  "BB" ]
        - [ "CO",  "SB" ]
      bet_menus: [ "bvs" ]        # Why: lean sizes specialized for steal nodes

    # --- 3-bet pots (caller perspective covered by menus) ---
    - name: VS_3BET_IP
      ctx: VS_3BET
      position_pairs:
        # IP caller vs OOP 3-bettor (postflop IP = BTN/CO)
        - [ "BTN", "BB" ]
        - [ "BTN", "SB" ]
        - [ "CO",  "BB" ]
        - [ "CO",  "SB" ]
      bet_menus: [ "3bet_ip" ]

    - name: VS_3BET_OOP
      ctx: VS_3BET
      position_pairs:
        # OOP caller vs IP 3-bettor share same pairs; menu builds OOP trees
        - [ "BTN", "BB" ]
        - [ "BTN", "SB" ]
        - [ "CO",  "BB" ]
        - [ "CO",  "SB" ]
      bet_menus: [ "3bet_oop" ]

    # --- 4-bet pots (split to avoid role mixing) ---
    - name: VS_4BET_IP
      ctx: VS_4BET
      position_pairs:
        # IP postflop = BTN/CO; OOP = blinds
        - [ "BTN", "BB" ]
        - [ "BTN", "SB" ]
        - [ "CO",  "BB" ]
        - [ "CO",  "SB" ]
      bet_menus: [ "4bet_ip" ]

    - name: VS_4BET_OOP
      ctx: VS_4BET
      position_pairs:
        # OOP postflop = blinds; IP = BTN/CO (pairs remain IP→OOP)
        - [ "BTN", "BB" ]
        - [ "BTN", "SB" ]
        - [ "CO",  "BB" ]
        - [ "CO",  "SB" ]
      bet_menus: [ "4bet_oop" ]

      # --- Limped pots ---
    - name: LIMPED_SINGLE
      ctx: LIMPED_SINGLE
      position_pairs:
        - [ "BB", "SB" ]     # ✅ BB is IP on flop; SB is OOP
      bet_menus: [ "limp" ]

solver:
  # Quality-friendly defaults (adjust if you need more throughput)
  accuracy: 0.01
  max_iterations: 15000
  threads: 1
  allin_threshold: 0.67
  s3_prefix: solver/outputs/v1
  local_cache_dir: data/solver_cache
  raise_mult: [1.5, 2.0, 2.5, 3.0, 4.0, 5.0]

train:
  seed: 42
  max_epochs: 15
  patience: 4
  batch_size: 2048
  devices: auto
  accelerator: auto
  precision: 16-mixed
  grad_clip: 1.0
  monitor: val_loss
  mode: min
  pin_memory: true

model:
  hidden_dims: [512, 512, 256]   # deeper/wider, postflop is richer
  dropout: 0.15                  # a touch more regularization
  lr: 5e-4                     # slightly lower than preflop
  weight_decay: 1e-4
  label_smoothing: 0.05          # softens overfitting
  use_board_cluster: true

sweep:
  model.hidden_dims:
    - [128, 128]
    - [256, 256]
  model.dropout: [0.10, 0.20]
  model.lr: [0.001, 0.0005]
  model.weight_decay: [0.0001, 0.00005]   # NEW
  model.label_smoothing: [0.0, 0.02]
  model.board_hidden: [64, 96]
  model.use_board_cluster: [true, false]
  train.batch_size: [1024, 2048]
  seed: [42, 1337]
  max_trials: 12