# ========= Postflop Policy (V1 FINAL) =========
# Canonical sizing:
#   size_frac := incremental bet / pot_pre
#   raise_to_frac := raise-to total / pot_pre
#   faced_frac := faced bet / pot_pre (of villain bet)

inputs:
  monker_manifest: data/artifacts/monker_manifest.parquet
  sph_manifest:    data/artifacts/sph_manifest.parquet
  vendor_s3_prefix: data/vendor
  manifest: data/artifacts/rangenet_postflop_manifest.parquet
  root_parquet: data/datasets/postflop_policy_root.parquet
  facing_parquet: data/datasets/postflop_policy_facing.parquet

builder:
  parts_s3_prefix_root: ""
  parts_s3_prefix_facing: ""

manifest_build:
  include_missing: false
  allow_pair_subs: true
  lookup_max_stack_delta: 200

  seed: 42
  sample_pool: 50000

  # Streets the builder must generate (looped explicitly)
  streets: [flop, turn, river]

  # Boards sampled per cluster per street
  boards_per_cluster:
    flop:  2
    turn:  2
    river: 2

  # Deduplication must match dataset column names exactly
  dedup_keys:
    - street
    - ctx
    - topology
    - role
    - ip_pos
    - oop_pos
    - effective_stack_bb
    - pot_bb
    - bet_sizing_id
    - board
    - board_cluster_id
    - stakes_id

  # Role-explicit scenarios
  scenarios:
    # --- SRP: PFR vs defender ---
    - name: SRP_PFR_IP
      ctx: VS_OPEN
      topology: SRP
      role: AGGRESSOR
      position_pairs:
        - ["UTG","BB"]
        - ["UTG","SB"]
        - ["HJ","BB"]
        - ["HJ","SB"]
        - ["CO","BB"]
        - ["CO","SB"]
        - ["BTN","BB"]
        - ["BTN","SB"]
      bet_menus: ["srp_hu.PFR_IP"]

    - name: SRP_CALLER_OOP
      ctx: VS_OPEN
      topology: SRP
      role: CALLER
      position_pairs:
        - ["UTG","BB"]
        - ["UTG","SB"]
        - ["HJ","BB"]
        - ["HJ","SB"]
        - ["CO","BB"]
        - ["CO","SB"]
        - ["BTN","BB"]
        - ["BTN","SB"]
      bet_menus: ["srp_hu.Caller_OOP"]

    # --- Blind vs steal ---
    - name: BVS_ANY
      ctx: BLIND_VS_STEAL
      topology: BVS
      role: ANY
      position_pairs:
        - ["BTN","BB"]
        - ["BTN","SB"]
        - ["CO","BB"]
        - ["CO","SB"]
      bet_menus: ["bvs.Any"]

    # --- 3bet pots ---
    - name: 3BP_AGG_IP
      ctx: VS_3BET
      topology: 3BP
      role: AGGRESSOR
      position_pairs:
        - ["BTN","BB"]
        - ["BTN","SB"]
        - ["CO","BB"]
        - ["CO","SB"]
      bet_menus: ["3bet_hu.Aggressor_IP"]

    - name: 3BP_AGG_OOP
      ctx: VS_3BET
      topology: 3BP
      role: AGGRESSOR
      position_pairs:
        - ["BTN","BB"]
        - ["BTN","SB"]
        - ["CO","BB"]
        - ["CO","SB"]
      bet_menus: ["3bet_hu.Aggressor_OOP"]

    # --- 4bet pots ---
    - name: 4BP_AGG_IP
      ctx: VS_4BET
      topology: 4BP
      role: AGGRESSOR
      position_pairs:
        - ["BTN","BB"]
        - ["BTN","SB"]
        - ["CO","BB"]
        - ["CO","SB"]
      bet_menus: ["4bet_hu.Aggressor_IP"]

    - name: 4BP_AGG_OOP
      ctx: VS_4BET
      topology: 4BP
      role: AGGRESSOR
      position_pairs:
        - ["BTN","BB"]
        - ["BTN","SB"]
        - ["CO","BB"]
        - ["CO","SB"]
      bet_menus: ["4bet_hu.Aggressor_OOP"]

    # --- Limped single ---
    - name: LIMP_BB_IP
      ctx: LIMPED_SINGLE
      topology: LIMP
      role: ANY
      position_pairs:
        - ["BB","SB"]
      bet_menus: ["limped_single.BB_IP"]

solver:
  accuracy: 0.01
  max_iterations: 15000
  threads: 1
  allin_threshold: 0.67
  s3_prefix: solver/outputs/v1
  local_cache_dir: data/solver_cache

  # Match NL10 stake config raise grid
  raise_mult: [2.0, 3.0, 4.5]

train:
  seed: 42
  max_epochs: 15
  patience: 4
  batch_size: 2048
  devices: auto
  accelerator: auto
  precision: 16-mixed
  grad_clip: 1.0
  monitor: val_loss
  mode: min
  pin_memory: true

model:
  hidden_dims: [512, 512, 256]
  dropout: 0.15
  lr: 5e-4
  weight_decay: 1e-4
  label_smoothing: 0.05
  use_board_cluster: true

sweep:
  model.hidden_dims: [[128,128],[256,256]]
  model.dropout: [0.10, 0.20]
  model.lr: [0.001, 0.0005]
  model.weight_decay: [0.0001, 0.00005]
  model.label_smoothing: [0.0, 0.02]
  train.batch_size: [1024, 2048]
  seed: [42, 1337]
  max_trials: 12