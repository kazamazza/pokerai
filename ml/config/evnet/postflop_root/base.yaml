# ml/config/evnet/postflop_root/base.yaml
# ==========================================================
# EVNet — POSTFLOP ROOT (no bet faced)
# Predict EV per root token (CHECK/BET_xx/DONK_33).
# Aligned to policy sidecar (64 clusters, NL10 stakes_id=2).
# ==========================================================

# POSTFLOP ROOT — CONFIG (updated)
dataset:
  seed: 42
  x_cols: ["hero_pos", "ip_pos", "oop_pos", "ctx", "street", "board_cluster_id", "stakes_id", "hand_id"]
  cont_cols: ["board_mask_52", "pot_bb", "stack_bb", "size_frac"]
  y_cols: null
  weight_col: "weight"
  min_weight: null
  stratify_keys: ["ctx", "hero_pos", "board_cluster_id", "stack_bb", "stakes_id"]

board_clustering:
  type: kmeans
  artifact: data/artifacts/board_clusters_kmeans_64.json
  n_clusters: 64

build:
  # If absent, builder synthesizes from scenarios + menus
  stacks_bb: [25, 60, 100, 150]          # <- fixed
  contexts: ["VS_OPEN", "VS_3BET", "VS_4BET", "LIMPED_SINGLE"]
  pairs_ip_oop:
    VS_OPEN:
      - ["UTG","BB"]
      - ["UTG","SB"]
      - ["HJ","BB"]
      - ["HJ","SB"]
      - ["CO","BB"]
      - ["CO","SB"]
      - ["BTN","BB"]
      - ["BTN","SB"]
    VS_3BET:
      - ["BTN","BB"]
      - ["BTN","SB"]
      - ["CO","BB"]
      - ["CO","SB"]
    VS_4BET:
      - ["BTN","BB"]
      - ["BTN","SB"]
      - ["CO","BB"]
      - ["CO","SB"]
    LIMPED_SINGLE:
      - ["BB","SB"]
  samples_per_board: 512

compute:
  engine: eval7
  threads: auto
  chunk_size: 4096
  log_every_n: 20000
  seed: 42
  mc:
    min_samples: 256
    max_samples: 0
  river_exact: true

paths:
  manifest_path: data/artifacts/evnet_postflop_root_manifest.parquet
  parquet_path:  data/datasets/evnet_postflop_root.parquet
  tmp_dir:       data/tmp/evnet_postflop_root

inputs:
  # Ranges to sample villain from (already materialized 169-d vecs)
  preflop_ranges_parquet: data/datasets/rangenet_preflop_from_flop_NL10.parquet
  # Board clustering artifact (must match policy)
  board_clusters_artifact: data/artifacts/board_clusters_kmeans_64.json

validation:
  strict: true

model:
  # Must match policy sidecar root action_vocab
  action_vocab_import: "ml.models.vocab_actions:ROOT_ACTION_VOCAB"
  hidden_dims: [256, 256]
  dropout: 0.10
  lr: 0.001
  weight_decay: 0.0001
  output_mode: "ev_vector"

train:
  seed: 42
  train_frac: 0.80
  batch_size: 1024
  num_workers: 0
  pin_memory: true
  max_epochs: 20
  patience: 5
  monitor: val_mae_bb
  mode: min
  accelerator: auto
  devices: auto
  precision: 16-mixed
  checkpoints_dir: checkpoints/evnet_postflop_root
  resume_from: null

logging:
  tb_log_dir: logs/tb

encoders:
  id_maps:
    street: {"1": 0}
    ctx: {"LIMPED_SINGLE": 0, "VS_3BET": 1, "VS_4BET": 2, "VS_OPEN": 3}
    hero_pos: {"IP": 0, "OOP": 1}
    ip_pos: {"IP": 0}
    oop_pos: {"OOP": 0}
    stakes_id: {"2": 0}

sweep:
  model.hidden_dims:
    - [256, 256]
    - [256, 128]
    - [384, 256]
  model.dropout: [0.10, 0.15, 0.20]
  model.lr: [0.0010, 0.0007, 0.0005]
  model.weight_decay: [0.0001, 0.0003]
  model.max_emb_dim: [32, 48, 64]
  train.batch_size: [512, 1024, 2048]
  seed: [42, 1337]
  max_trials: 16