dataset:
  seed: 42
  # keep these in sync with what the builder writes
  x_cols: ["hero_pos", "villain_pos", "stakes_id", "facing_flag", "free_check", "hand_id"]
  cont_cols: ["stack_bb", "pot_bb", "faced_frac"]
  y_cols: null
  weight_col: "weight"
  min_weight: null
  # add faced_frac so 2.0/2.5/3.0/3.5 coverage stays balanced across stacks
  stratify_keys: ["stakes_id", "facing_flag", "free_check", "faced_frac"]

build:
  include_facing: true
  include_unopened: true

  stacks_bb: [25, 40, 60, 80, 100, 150]

  # unopened branch only (we force faced_frac=0.0 there)
  faced_fracs: [0.0]

  # facing-open branch uses absolute open sizes (bb), not fraction of stack
  faced_open_bbs: [ 2.0, 2.5, 3.0, 3.5 ]   # absolute bb

  # ensure hero=BB appears so free-check exists in unopened
  pairs:
    - ["UTG","HJ"]
    - ["UTG","CO"]
    - ["UTG","BTN"]
    - ["UTG","SB"]
    - ["UTG","BB"]
    - ["HJ","CO"]
    - ["HJ","BTN"]
    - ["HJ","SB"]
    - ["HJ","BB"]
    - ["CO","BTN"]
    - ["CO","SB"]
    - ["CO","BB"]
    - ["BTN","SB"]
    - ["BTN","BB"]
    - ["BB","SB"]
    - ["BB","BTN"]
    - ["BB","CO"]
    - ["BB","HJ"]
    - ["BB","UTG"]

  pre_pot_bb: 1.5

  # Crank this up for production volume (row count scales linearly)
  samples_per_combination: 512

compute:
  engine: eval7
  threads: auto
  chunk_size: 8192             # better GPU/CPU throughput than 4096
  log_every_n: 40000
  seed: 42
  preflop_samples: 15000       # ↑ from 5000 → lower label noise
  river_exact: true

paths:
  manifest_path: data/artifacts/evnet_preflop_manifest.parquet
  parquet_path:  data/datasets/evnet_preflop.parquet
  tmp_dir:       data/tmp/evnet_preflop

inputs:
  preflop_ranges_parquet: data/datasets/rangenet_preflop_from_flop_NL10.parquet

validation:
  strict: true

model:
  # MUST match your generator’s centi-bb tokens
  action_vocab_import: "ml.models.vocab_actions:PREFLOP_ACTION_VOCAB"
  hidden_dims: [256, 256]
  dropout: 0.10
  lr: 0.001
  weight_decay: 0.0001
  output_mode: "ev_vector"

train:
  seed: 42
  train_frac: 0.80
  batch_size: 2048
  num_workers: 0
  pin_memory: true
  max_epochs: 20
  patience: 5
  monitor: val_mae_bb
  mode: min
  accelerator: auto
  devices: auto
  precision: 16-mixed
  checkpoints_dir: checkpoints/evnet_preflop
  resume_from: null


logging:
  tb_log_dir: logs/tb

encoders:
  id_maps:
    stakes_id:
      "2": 0  # NL10 -> 0

preflop_generator:
  open_sizes_cbb: [200, 250, 300]
  raise_totals_cbb: [600, 750, 900, 1200]
  allow_allin: true
  max_open_cbb: null

sweep:
  model.hidden_dims:
    - [256, 256]
    - [384, 256]
    - [512, 256]
  model.dropout: [0.05, 0.10, 0.15]
  model.lr: [0.0010, 0.0007, 0.0005]
  model.weight_decay: [0.0001, 0.0003, 0.00001]
  model.max_emb_dim: [32, 48, 64]
  train.batch_size: [2048, 4096]
  seed: [42, 1337]
  max_trials: 20