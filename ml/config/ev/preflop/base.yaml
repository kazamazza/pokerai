# ml/config/evnet/preflop/base.yaml
# ==========================================================
# EVNet — PREFLOP (street=0)
# Predict EV per preflop token (OPEN_/RAISE_/CALL/etc.).
# ==========================================================

dataset:
  seed: 42

  # Categorical features
  x_cols: ["hero_pos", "villain_pos", "stakes_id"]
  # Continuous features
  cont_cols: ["stack_bb", "pot_bb", "faced_frac"]

  # Target vector = EV per action in action_vocab (same order)
  y_cols: null  # inferred from model.action_vocab

  # Optional weighting (e.g., MC sim count per row)
  weight_col: "weight"
  min_weight: null
  stratify_keys: ["stakes_id"]

build:
  # Where to source rows (preflop contexts)
  include_facing: true
  include_unopened: true
  # Sampling
  stacks_bb: [25, 60, 100, 150]
  faced_fracs: [0.0, 0.25, 0.33, 0.5]  # 0.0 used for unopened
  pairs:
    - ["UTG","HJ"]   # examples; builder can enumerate all legal preflop pairs as you prefer
    - ["UTG","CO"]
    - ["UTG","BTN"]
    - ["HJ","CO"]
    - ["HJ","BTN"]
    - ["CO","BTN"]
    - ["SB","BB"]
  samples_per_combination: 64

compute:
  engine: eval7
  threads: auto
  chunk_size: 4096
  log_every_n: 20000
  seed: 42
  preflop_samples: 20000
  river_exact: true

paths:
  manifest_path: data/artifacts/evnet_preflop_manifest.parquet
  parquet_path:  data/datasets/evnet_preflop.parquet
  tmp_dir:       data/tmp/evnet_preflop

inputs:
  # If you want to reuse any preflop range parquet as helper features later
  preflop_ranges_parquet: data/datasets/rangenet_preflop_from_flop_NL10.parquet

validation:
  strict: true

model:
  # Output = len(action_vocab) EVs
  action_vocab:
    - "FOLD"
    - "CHECK"          # BB vs unopened
    - "CALL"           # only when facing > 0
    - "OPEN_2"
    - "OPEN_25"
    - "OPEN_3"
    - "RAISE_2P5"      # 2.5× faced bet (bb units naming)
    - "RAISE_3"
    - "RAISE_4"
    - "ALLIN"
  hidden_dims: [256, 256]
  dropout: 0.10
  lr: 0.001
  weight_decay: 0.0001
  output_mode: "ev_vector"   # regression; MSE/Huber over per-action EV

train:
  seed: 42
  train_frac: 0.80
  batch_size: 1024
  num_workers: 0
  pin_memory: true
  max_epochs: 20
  patience: 5
  monitor: val_loss
  mode: min
  accelerator: auto
  devices: auto
  precision: 16-mixed
  checkpoints_dir: checkpoints/evnet_preflop
  resume_from: null

logging:
  tb_log_dir: logs/tb

encoders:
  id_maps:
    stakes_id:
      "2": 0   # NL10 -> 0