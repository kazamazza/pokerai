dataset:
  seed: 42
  # keep these in sync with what your builder actually writes!
  x_cols: ["hero_pos", "villain_pos", "stakes_id", "facing_flag", "free_check", "hand_id"]
  cont_cols: ["stack_bb", "pot_bb", "faced_frac"]
  y_cols: null
  weight_col: "weight"
  min_weight: null
  stratify_keys: ["stakes_id", "facing_flag"]  # add "stack_bin" only if builder writes it

build:
  include_facing: true
  include_unopened: true

  # Broader stack coverage (binned by you later if desired)
  stacks_bb: [25, 40, 60, 80, 100, 150]

  # Faced sizes (0.0 is the unopened branch)
  faced_fracs: [0.33, 0.66]

  # Enumerate common heads-up preflop seat pairs (hero_pos, villain_pos)
  pairs:
    - ["UTG","HJ"]
    - ["UTG","CO"]
    - ["UTG","BTN"]
    - ["UTG","SB"]
    - ["UTG","BB"]
    - ["HJ","CO"]
    - ["HJ","BTN"]
    - ["HJ","SB"]
    - ["HJ","BB"]
    - ["CO","BTN"]
    - ["CO","SB"]
    - ["CO","BB"]
    - ["BTN","SB"]
    - ["BTN","BB"]
    - ["SB","BB"]   # BB can free-check when unopened in this pair

  # Crank this up for production volume (row count scales linearly)
  samples_per_combination: 512

  pre_pot_bb: 1.5   # preflop antes/pot model (keep as-is unless your game format differs)

compute:
  engine: eval7
  threads: auto
  chunk_size: 4096
  log_every_n: 20000
  seed: 42
  preflop_samples: 5000   # MC sims per row; keep moderate and use 'weight' to reflect it
  river_exact: true

paths:
  manifest_path: data/artifacts/evnet_preflop_manifest.parquet
  parquet_path:  data/datasets/evnet_preflop.parquet
  tmp_dir:       data/tmp/evnet_preflop

inputs:
  preflop_ranges_parquet: data/datasets/rangenet_preflop_from_flop_NL10.parquet

validation:
  strict: true

model:
  # MUST match your generator’s centi-bb tokens
  action_vocab:
    - "FOLD"
    - "CHECK"
    - "CALL"
    - "OPEN_200"
    - "OPEN_250"
    - "OPEN_300"
    - "RAISE_600"
    - "RAISE_750"
    - "RAISE_900"
    - "RAISE_1200"
    - "ALLIN"
  hidden_dims: [256, 256]
  dropout: 0.10
  lr: 0.001
  weight_decay: 0.0001
  output_mode: "ev_vector"

train:
  seed: 42
  train_frac: 0.80
  batch_size: 2048
  num_workers: 0
  pin_memory: true
  max_epochs: 20
  patience: 5
  monitor: val_loss
  mode: min
  accelerator: auto
  devices: auto
  precision: 16-mixed
  checkpoints_dir: checkpoints/evnet_preflop
  resume_from: null

logging:
  tb_log_dir: logs/tb

encoders:
  id_maps:
    stakes_id:
      "2": 0  # NL10 -> 0

preflop_generator:
  open_sizes_cbb: [200, 250, 300]
  raise_totals_cbb: [600, 750, 900, 1200]
  allow_allin: true
  max_open_cbb: null