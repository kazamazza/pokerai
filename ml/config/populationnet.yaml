data:
  parquet: "data/processed/populationnet_nl10.parquet"
  use_coverage: true          # informative only; parquet was already built using coverage
  filters:
    keep_ctx_ids: null
    keep_street_ids: null
    min_weight: 10            # filter at load-time if desired

coverage:
  # kept for symmetry/traceability; actual coverage was applied at parquet-build time
  output: "reports/coverage/populationnet_nl10.json"
  group_by: ["stakes_id", "street_id", "ctx_id", "hero_pos_id", "villain_pos_id"]
  min_rows_per_cell: 50
  min_cells_per_ctx: 10

model:
  hidden_dims: [64, 64]
  dropout: 0.10
  lr: 0.001
  weight_decay: 0.0001
  soft_labels: true           # PopulationNet uses soft labels (p_fold, p_call, p_raise)

train:
  batch_size: 2048
  max_epochs: 10
  patience: 3
  num_workers: 0
  accelerator: "auto"
  devices: "auto"
  precision: "16-mixed"
  seed: 42
  monitor: "val_loss"
  mode: "min"
  checkpoints_dir: "ml/checkpoints/popnet"